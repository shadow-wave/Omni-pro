<body class="font-sans">

    <!-- Ambient Background -->
    <div class="fixed inset-0 -z-10 pointer-events-none">
        <div class="absolute top-0 left-0 w-full h-full bg-[#030305]"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[300px] h-[300px] bg-indigo-600/10 rounded-full animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[300px] h-[300px] bg-purple-600/10 rounded-full animate-blob" style="animation-delay: -4s"></div>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#030305] flex flex-col items-center justify-center transition-all duration-700">
        <div class="w-24 h-24 rounded-[28px] bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white text-4xl shadow-2xl animate-float border border-white/10">
            <i class="fa-brands fa-python"></i>
        </div>
        <h1 class="mt-8 text-4xl font-bold text-white tracking-tighter">Omni-Studio<span class="text-indigo-500">.</span></h1>
        <p class="mt-2 text-indigo-300/40 text-[10px] font-bold tracking-[0.2em] uppercase">Liquid Kernel v4.0</p>
        <div class="mt-12 w-64 px-4 space-y-3">
            <button onclick="enterStudio()" class="w-full py-4 glass-panel rounded-2xl font-bold text-white flex items-center justify-center gap-3 active:scale-95 transition-transform">
                <div class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_#4ade80]"></div>
                Boot Core
            </button>
            <button onclick="downloadApp()" class="w-full py-2 text-gray-500 text-[10px] font-bold uppercase tracking-widest">Offline Mode</button>
        </div>
        <div class="absolute bottom-8 text-[10px] text-gray-700 font-bold uppercase tracking-widest">Aravind O K</div>
    </div>

    <!-- HEADER -->
    <header class="h-16 flex items-center justify-between px-5 shrink-0 z-50 fixed top-0 w-full glass-header">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-indigo-400">
                <i class="fa-solid fa-microchip"></i>
            </div>
            <div>
                <h1 class="font-bold text-sm text-white leading-tight">Omni-Studio</h1>
                <div class="flex items-center gap-1.5">
                    <div id="status-indicator" class="w-1.5 h-1.5 rounded-full bg-amber-500"></div>
                    <span id="status-text" class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">Standby</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div id="mem-usage" class="hidden flex-col items-end mr-2">
                <div class="w-16 h-1 bg-white/5 rounded-full overflow-hidden">
                    <div id="mem-bar" class="h-full bg-indigo-500 w-0 transition-all duration-700"></div>
                </div>
            </div>
            <button id="run-btn" onclick="runCode()" disabled="" class="w-11 h-11 rounded-xl flex items-center justify-center bg-indigo-600/20 border border-indigo-500/30 text-indigo-400 active:scale-90 disabled:opacity-20 transition-all">
                <i class="fa-solid fa-play text-lg ml-0.5"></i>
            </button>
        </div>
    </header>

    <!-- SPACER -->
    <div class="h-16 shrink-0"></div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-hidden relative p-3">
        
        <!-- EDITOR TAB -->
        <div id="tab-editor" class="tab-content active h-full">
            <div class="flex-1 rounded-2xl glass-panel overflow-hidden border-white/5 shadow-xl">

Omni-Studio | Portrait Fixed</span></span></pre></div><div style="position: relative;"><div class="CodeMirror-gutter-wrapper" aria-hidden="true" contenteditable="false" style="left: -29px;"><div class="CodeMirror-linenumber CodeMirror-gutter-elt" style="left: 0px; width: 21px;">2</div></div><pre class=" CodeMirror-line " role="presentation"><span role="presentation" style="padding-right: 0.1px;"><span class="cm-keyword">def</span> <span class="cm-def">check_system</span>():</span></pre></div><div style="position: relative;"><div class="CodeMirror-gutter-wrapper" aria-hidden="true" contenteditable="false" style="left: -29px;"><div class="CodeMirror-linenumber CodeMirror-gutter-elt" style="left: 0px; width: 21px;">3</div></div><pre class=" CodeMirror-line " role="presentation"><span role="presentation" style="padding-right: 0.1px;"> &nbsp; &nbsp;<span class="cm-builtin">print</span>(<span class="cm-string">"&gt;&gt;&gt; System Ready"</span>)</span></pre></div><div style="position: relative;"><div class="CodeMirror-gutter-wrapper" aria-hidden="true" contenteditable="false" style="left: -29px;"><div class="CodeMirror-linenumber CodeMirror-gutter-elt" style="left: 0px; width: 21px;">4</div></div><pre class=" CodeMirror-line " role="presentation"><span role="presentation" style="padding-right: 0.1px;"><span class="cm-variable">check_system</span>()</span></pre></div></div></div></div></div></div><div style="position: absolute; height: 50px; width: 1px; border-bottom: 0px solid transparent; top: 92px;"></div><div class="CodeMirror-gutters" style="height: 142px; left: 0px;"><div class="CodeMirror-gutter CodeMirror-linenumbers" style="width: 29px;"></div></div></div></div>

        <button onclick="switchTab('terminal')" class="nav-item" data-target="terminal"><i class="fa-solid fa-terminal"></i></button>

    <style>
        .lab-card-mobile { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 16px; display: flex; align-items: center; font-size: 12px; font-weight: 600; color: #94a3b8; text-align: left; transition: transform 0.2s; }
        .lab-card-mobile:active { transform: scale(0.98); }
        .lab-card-mobile .n { font-family: 'JetBrains Mono'; font-size: 9px; color: #6366f1; margin-right: 12px; background: rgba(99, 102, 241, 0.1); padding: 2px 6px; border-radius: 6px; }
        .completed-lab { color: #4ade80 !important; border-color: #4ade8022 !important; }
        .completed-lab i { display: inline !important; }
        .nav-item { color: #475569; font-size: 18px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; transition: 0.3s; border-radius: 12px; }
        .nav-item.active { color: #6366f1; background: rgba(99, 102, 241, 0.1); }
    </style>

    <script>
        // --- SNATCHER TO PREVENT STRAY PLOTS ---
        const plotSnatcher = new MutationObserver((mutations) => {
            for (const mutation of mutations) {
                for (const node of mutation.addedNodes) {
                    if (node.id && node.id.startsWith('matplotlib')) {
                        const target = document.getElementById('plot-target');
                        if (target) {
                            target.innerHTML = ''; 
                            target.appendChild(node);
                        }
                    }
                }
            }
        });
        plotSnatcher.observe(document.body, { childList: true });

        let pyodide = null, micropip = null, completedLabs = new Set();
        const outputElement = document.getElementById("output"), statusText = document.getElementById("status-text"), statusInd = document.getElementById("status-indicator"), runBtn = document.getElementById("run-btn");

        // FIX: Added 'inputStyle: "contenteditable"' to fix mobile keyboard backspacing across lines.
        const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), { 
            mode: { name: "python", version: 3 }, 
            theme: "nord", 
            lineNumbers: true, 
            indentUnit: 4, 
            autoCloseBrackets: true, 
            styleActiveLine: true, 
            lineWrapping: true,
            inputStyle: "contenteditable", // <-- This fixes the mobile keyboard bug!
            spellcheck: false
        });

        const defaultCode = `# Omni-Studio | Portrait Fixed\ndef check_system():\n    print(">>> System Ready")\ncheck_system()`;
        const savedCode = localStorage.getItem("omni_pro_v4");
        editor.setValue(savedCode || defaultCode);
        editor.on("change", () => localStorage.setItem("omni_pro_v4", editor.getValue()));

        // Boot core immediately in the background so it's ready when the user enters
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(initPyodide, 100); 
        });

        async function initPyodide() {
            try {
                pyodide = await loadPyodide();
                await pyodide.loadPackage(["micropip", "matplotlib"]);
                micropip = pyodide.pyimport("micropip");
                await pyodide.runPythonAsync(`import builtins\nfrom js import prompt\ndef custom_input(p=""):\n val = prompt(p)\n print(f"{p}{val}")\n return val\nbuiltins.input = custom_input`);
                pyodide.setStdout({ batched: (msg) => log(msg) });
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-green-400 shadow-[0_0_6px_#4ade80]";
                statusText.innerText = "Online"; statusText.classList.replace("text-gray-500", "text-green-400");
                runBtn.disabled = false; document.getElementById("mem-usage").classList.remove("hidden");
                refreshFileList(); loadProgress();
            } catch (err) { statusInd.className = "w-1.5 h-1.5 rounded-full bg-red-500"; statusText.innerText = "Error"; }
        }

        async function runCode() {
            const code = editor.getValue();
            if(!code.trim()) return;
            runBtn.disabled = true;
            document.getElementById("mem-bar").style.width = "90%";
            if(code.includes("matplotlib") || code.includes("plt.")) switchTab('plots'); else switchTab('terminal');
            try {
                if (code.includes("matplotlib")) {
                     preparePlots();
                     await pyodide.runPythonAsync(`import matplotlib\nimport matplotlib.pyplot as plt\nmatplotlib.use("module://matplotlib_pyodide.html5_canvas_backend")\nplt.close('all')\nplt.rcParams['figure.autolayout'] = True`);
                     window.document.pyodideMplTarget = document.getElementById("plot-target");
                }
                await pyodide.runPythonAsync(code);
                checkLabCompletion(code);
            } catch (err) { log(`\n>> Error: ${err}`, "text-red-400"); } finally { runBtn.disabled = false; document.getElementById("mem-bar").style.width = "30%"; }
        }

        // Added Data Science Pack Installation
        async function installDataScience() {
            if (!micropip) { alert("System starting. Please wait..."); return; }
            const bar = document.getElementById("ds-status").firstElementChild;
            bar.style.width = "50%";
            switchTab('terminal');
            log("Installing Data Science packages (NumPy, SciPy, Matplotlib)...", "text-indigo-400");
            try {
                await micropip.install(['numpy', 'scipy', 'matplotlib']);
                bar.style.width = "100%";
                bar.classList.replace("bg-indigo-500", "bg-green-400");
                log("Data Science Pack fully installed!", "text-green-400");
            } catch (e) {
                bar.style.width = "0%";
                log("Installation failed: " + e, "text-red-400");
            }
        }

        // Added PIP Custom Installation Event
        document.getElementById("pip-input").addEventListener("keypress", async function(e) {
            if (e.key === "Enter") {
                const pkg = this.value.trim();
                if (!pkg || !micropip) return;
                this.value = "";
                switchTab('terminal');
                log(`Installing package '${pkg}'...`, "text-indigo-400");
                try {
                    await micropip.install(pkg);
                    log(`Package '${pkg}' installed successfully!`, "text-green-400");
                } catch(err) {
                    log(`Failed to install '${pkg}': ${err}`, "text-red-400");
                }
            }
        });

        function enterStudio() { const s = document.getElementById('splash-screen'); s.style.opacity = '0'; setTimeout(() => { s.style.display = 'none'; editor.refresh(); }, 700); }
        function switchTab(id) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.getElementById(`tab-${id}`).classList.add('active'); document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('active', btn.dataset.target === id)); if(id === 'editor') setTimeout(() => editor.refresh(), 50); }
        function log(msg, cls="text-emerald-400") { const d = document.createElement("div"); d.className = cls + " mb-1"; d.innerText = msg; outputElement.appendChild(d); outputElement.scrollTop = outputElement.scrollHeight; }
        function clearTerminal() { outputElement.innerHTML=""; }
        function clearEditor() { if(confirm("Clear Script?")) editor.setValue("# New Script\n"); }
        function insert(t) { const d = editor.getDoc(), c = d.getCursor(); d.replaceRange(t, c); if(t.includes('()')||t.includes('[]')||t.includes('\'\'')) d.setCursor({line:c.line, ch:c.ch+1}); editor.focus(); }
        
        // BACKSPACE FEATURE FIX
        function backspaceCode() { editor.execCommand("delCharBefore"); editor.focus(); }

        function preparePlots() { if(document.getElementById("plot-placeholder")) document.getElementById("plot-placeholder").style.display='none'; document.getElementById("btn-download-plot").classList.remove("hidden"); }
        function clearPlots() { document.getElementById("plot-target").innerHTML = `<div id="plot-placeholder" class="text-center opacity-10"><i class="fa-solid fa-chart-area text-5xl mb-2"></i><p class="text-[10px] font-mono uppercase">No Data</p></div>`; document.getElementById("btn-download-plot").classList.add("hidden"); }
        function downloadPlot() { const c = document.querySelector("#plot-target canvas"); if(c) { const a = document.createElement('a'); a.download='OmniPlot.png'; a.href=c.toDataURL(); a.click(); } }

        const snippets = {
            lab_1: `print("Hello, World!")`, lab_2: `name = "Omni"\nversion = 4.0\nprint(f"{name} v{version}")`, lab_3: `x = 10\ny = 5.5\nz = "A"\nprint(type(x), type(y), type(z))`, lab_4: `val = input("Name: ")\nprint(f"Hi {val}")`, lab_5: `a, b = 10, 3\nprint(a + b, a ** b)`, lab_6: `data = [1, 2, 3]\ndata.append(4)\nprint(data)`, lab_7: `x = 10\nif x > 5: print("Pass")`, lab_8: `for i in range(3): print(i)`, lab_9: `n = 85\nmsg = "A" if n > 80 else "B"\nprint(msg)`, lab_10: `def hi(n): return n*2\nprint(hi(10))`,
            data_science: `import matplotlib.pyplot as plt\nimport numpy as np\nplt.style.use('dark_background')\nx = np.linspace(0, 10, 100)\ny = np.sin(x)\nplt.figure(figsize=(6,4))\nplt.plot(x, y, color='#6366f1', lw=3)\nplt.title("System Signal Output")\nplt.show()`,
            web_request: `from pyodide.http import pyfetch\nasync def get():\n    r = await pyfetch("https://dummyjson.com/quotes/random")\n    j = await r.json()\n    print(j['quote'])\nawait get()`
        };

        function loadSnippet(k) { if(confirm("Load Module?")) { editor.setValue(snippets[k]); switchTab('editor'); } }
        function checkLabCompletion(code) { for (let k in snippets) if (code.trim() === snippets[k].trim()) markLabDone(k); }
        function markLabDone(k) { completedLabs.add(k); const btn = document.getElementById(`${k}_btn`); if (btn) btn.classList.add("completed-lab"); saveProgress(); updateProgressUI(); }
        function updateProgressUI() { const total = 10, percent = Math.round((completedLabs.size / total) * 100); if(document.getElementById("progress-percent")) document.getElementById("progress-percent").innerText = `${percent}%`; if(document.getElementById("progress-bar")) document.getElementById("progress-bar").style.width = `${percent}%`; }
        function saveProgress() { localStorage.setItem("omni_progress", JSON.stringify([...completedLabs])); }
        function loadProgress() { const data = localStorage.getItem("omni_progress"); if (data) { const arr = JSON.parse(data); arr.forEach(k => { completedLabs.add(k); const btn = document.getElementById(`${k}_btn`); if (btn) btn.classList.add("completed-lab"); }); updateProgressUI(); } }
        function saveFile() { const n = document.getElementById("filename-input").value; if(!n) return; const s = JSON.parse(localStorage.getItem("omni_local_v4")||"{}"); s[n] = editor.getValue(); localStorage.setItem("omni_local_v4", JSON.stringify(s)); refreshFileList(); }
        function refreshFileList() { const l = document.getElementById("file-list"); l.innerHTML=""; const s = JSON.parse(localStorage.getItem("omni_local_v4")||"{}"); Object.keys(s).forEach(k => { const d = document.createElement("div"); d.className = "flex justify-between items-center p-3 rounded-xl bg-white/5 border border-white/5"; d.innerHTML = `<span class="text-[10px] text-white font-mono">${k}</span><div class="flex gap-3"><button onclick="editor.setValue(JSON.parse(localStorage.getItem('omni_local_v4'))['${k}']);switchTab('editor')" class="text-indigo-400"><i class="fa-solid fa-folder-open"></i></button><button onclick="deleteFile('${k}')" class="text-red-500/50"><i class="fa-solid fa-trash"></i></button></div>`; l.appendChild(d); }); }
        function deleteFile(k) { if(confirm("Delete?")) { const x = JSON.parse(localStorage.getItem('omni_local_v4')); delete x[k]; localStorage.setItem('omni_local_v4', JSON.stringify(x)); refreshFileList(); } }
        function downloadApp() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([document.documentElement.outerHTML], {type:'text/html'})); a.download = 'Omni_Studio_v4.html'; a.click(); }
    </script>
